<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Room Control — Hearth-Connect</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="page" id="app">
    <header class="control-header" style="justify-content:center">
      <div class="header-left">
        <h1>Room Control</h1>
        <span id="connectionDot" class="status-dot offline"></span>
      </div>
    </header>

    <div id="monitorFeed" class="monitor-feed hidden">
      <video id="monitorVideo" autoplay playsinline></video>
      <div id="ftDebug" class="ft-debug">ft:idle</div>
      <div id="rxDebug" class="rx-debug">rx:idle</div>
      <div id="monitorPlaceholder" class="monitor-placeholder hidden">
        <div>No feed selected</div>
      </div>
      <div id="monitorError" class="monitor-error hidden"></div>
      <button id="monitorResumeBtn" class="monitor-resume hidden" title="Resume">&#9654;</button>
      <div class="monitor-overlay">
        <span id="monitorStatus" class="monitor-status hidden"></span>
        <button id="monitorMuteBtn" class="icon-btn" type="button" aria-label="Mute" aria-pressed="false" title="Mute">
          <svg class="ic ic-unmuted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>
          <svg class="ic ic-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 5 6 9H2v6h4l5 4z"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg>
        </button>
        <button id="monitorTalkBtn" class="icon-btn" type="button" aria-label="Talk" aria-pressed="false" title="Talk">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="22"/></svg>
        </button>
        <span id="monitorQuality" class="monitor-quality"></span>
        <button id="monitorFullscreenBtn" class="icon-btn fs" type="button" aria-label="Fullscreen" aria-pressed="false" title="Fullscreen">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M16 3h3a2 2 0 0 1 2 2v3"/><path d="M8 21H5a2 2 0 0 1-2-2v-3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
        </button>
        <button id="stopMonitorBtn" class="icon-btn stop" type="button" aria-label="Stop" title="Stop">
          <svg class="ic" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        </button>
      </div>

      <div id="volumeWidget" class="volume-widget">
        <div id="volumeSliderWrap" class="volume-slider-wrap hidden">
          <input type="range" id="monitorVolume" min="0" max="200" step="1" value="100" orient="vertical">
        </div>
        <button id="volumeToggleBtn" class="volume-toggle" title="Volume">&#128266;</button>
      </div>
    </div>

    <div id="homeView">
      <div class="panel devices-panel">
        <h2>Devices</h2>
        <div id="deviceList" class="device-list"></div>
      </div>

      <div id="configPanel" class="panel hidden">
        <h2 id="configTitle">Settings</h2>
        <div id="configForm" class="config-form"></div>
      </div>
    </div>
  </div>

  <audio id="remoteAudio" autoplay playsinline></audio>
  <audio id="noSleepAudio" loop playsinline></audio>

  <div id="toast" class="toast hidden"></div>

  <div id="incomingCall" class="call-modal hidden">
    <div class="call-box">
      <div class="call-title">Incoming call</div>
      <div id="incomingCallFrom" class="call-from"></div>
      <div class="call-actions">
        <button id="answerCallBtn" class="btn btn-primary">Answer</button>
        <button id="dismissCallBtn" class="btn btn-outline">Dismiss</button>
      </div>
    </div>
  </div>

  <script src="/js/signaling.js"></script>
  <script src="/js/webrtc.js"></script>
  <script src="/js/room-control.js"></script>
  <script src="/js/topbar.js"></script>
</body>
</html>
