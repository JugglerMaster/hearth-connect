services:
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./data:/data
      - ./certs:/certs:ro
    environment:
      - SERVER_PORT=443
      - SERVER_HTTP_PORT=80
      - CERT_DIR=/certs
      - DATA_DIR=/data
      - TLS_ENABLED=true
    restart: unless-stopped
