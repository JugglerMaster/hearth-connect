<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Base Station — Hearth-Connect</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="page" id="app">
    <header class="control-header">
      <div class="header-left">
        <h1>Base Station</h1>
        <span id="connectionDot" class="status-dot offline"></span>
      </div>
    </header>

    <div id="monitorFeed" class="monitor-feed hidden">
      <video id="monitorVideo" autoplay playsinline></video>
      <div id="monitorPlaceholder" class="monitor-placeholder hidden">
        <div>🔊 Listening…</div>
      </div>
      <div id="monitorError" class="monitor-error hidden"></div>
      <div class="monitor-overlay">
        <span id="monitorLabel"></span>
        <span id="monitorMode" class="monitor-mode"></span>
        <span id="monitorStatus" class="monitor-status hidden"></span>
        <label class="volume-control" title="Volume">
          <span class="volume-icon">🔊</span>
          <input type="range" id="monitorVolume" min="0" max="200" step="1" value="100">
        </label>
        <button id="stopMonitorBtn" class="btn btn-small btn-outline">Stop</button>
      </div>
    </div>

    <div id="homeView">
      <div class="panel devices-panel">
        <h2>Devices</h2>
        <div id="deviceList" class="device-list"></div>
      </div>

      <div id="configPanel" class="panel hidden">
        <h2 id="configTitle">Settings</h2>
        <div id="configForm" class="config-form"></div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/js/signaling.js"></script>
  <script src="/js/webrtc.js"></script>
  <script src="/js/base-station.js"></script>
</body>
</html>
