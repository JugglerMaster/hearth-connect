<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Kiosk — Hearth-Connect</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="kiosk-page">
  <video id="cameraFeed" class="fullscreen-video" autoplay playsinline muted></video>

  <div class="kiosk-overlay">
    <div class="status-row">
      <span id="connectionDot" class="status-dot offline"></span>
      <span id="deviceLabel" class="device-label">Kiosk</span>
    </div>
    <div class="debug-bar">
      <span id="debugCamStatus">cam:--</span>
      <span id="debugTracks">tracks:--</span>
      <span id="debugSubs">subs:0</span>
    </div>
    <div id="debugEvent" class="debug-event">ev:--</div>
  </div>

  <div id="cameraError" class="camera-error hidden">
    <div class="camera-error-box">
      <p class="camera-error-title">Camera unavailable</p>
      <p id="cameraErrorMsg" class="camera-error-msg"></p>
      <button id="retryCameraBtn" class="btn btn-primary">Retry Camera</button>
    </div>
  </div>

  <script src="/js/signaling.js"></script>
  <script src="/js/webrtc.js"></script>
  <script src="/js/camera.js"></script>
</body>
</html>
