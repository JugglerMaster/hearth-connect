<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream Test — Hearth-Connect</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, system-ui, sans-serif; background:#0a0a0f; color:#e0e0f0; padding:12px; }
    .header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .dot { width:10px; height:10px; border-radius:50%; background:#606080; transition:0.3s; }
    .dot.online { background:#4af77a; box-shadow:0 0 6px #4af77a; }
    .dot.offline { background:#f74a4a; }
    .dot.reconnecting { background:#f7c84a; animation:pulse 1.5s infinite; }
    .dot.connected { background:#4a7cf7; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    video { width:100%; background:#000; border-radius:8px; margin-bottom:8px; }
    #log { font:12px/1.4 monospace; color:#8888a0; background:#14141f; border-radius:8px; padding:8px; max-height:200px; overflow-y:auto; white-space:pre-wrap; }
    #log .good { color:#4af77a; }
    #log .bad { color:#f74a4a; }
    #log .info { color:#4a7cf7; }
    .btn { display:inline-block; padding:6px 14px; border-radius:6px; border:1px solid #606080; background:transparent; color:#e0e0f0; font-size:13px; cursor:pointer; margin:2px; }
    .btn:active { opacity:0.7; }
    .btn.danger { border-color:#f74a4a; background:#2a1a1a; }
    #sources { display:flex; flex-direction:column; gap:6px; margin-top:6px; }
    .src { display:flex; justify-content:space-between; align-items:center; background:#14141f; padding:8px 12px; border-radius:6px; }
    .src .info { font-size:12px; }
    .src .name { font-weight:600; font-size:13px; }
    .src .meta { font-size:11px; color:#606080; }
  </style>
</head>
<body>
  <div class="header">
    <span id="wssDot" class="dot offline"></span>
    <strong>Stream Test</strong>
    <span id="wssStatus" style="font-size:12px;color:#888">disconnected</span>
    <span style="flex:1"></span>
    <span id="myId" style="font-size:10px;color:#606080"></span>
  </div>

  <video id="testVideo" autoplay playsinline muted></video>

  <div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap">
    <button id="testLocalBtn" class="btn">Test Video Element</button>
    <button id="stopViewBtn" class="btn danger" style="display:none">Stop Viewing</button>
  </div>

  <div id="sources"><div style="color:#606080;font-size:13px;padding:4px">No sources (connect iPhone kiosk first)</div></div>

  <div id="log">[Log will appear here]</div>

  <script src="/js/signaling.js"></script>
  <script src="/js/webrtc.js"></script>
  <script>
  (function () {
    const L = (msg, cls = '') => {
      const el = document.getElementById('log');
      const line = document.createElement('div');
      line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
      if (cls) line.className = cls;
      el.appendChild(line);
      el.scrollTop = el.scrollHeight;
      console.log(msg);
    };

    const sig = new SignalingClient();
    const rtc = new WebRTCManager(sig);
    const did = 'test-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
    document.getElementById('myId').textContent = did;
    let sources = [];
    let viewingPid = null;

    const video = document.getElementById('testVideo');
    const dot = document.getElementById('wssDot');
    const wssStatus = document.getElementById('wssStatus');

    // ── Local video element test ──
    document.getElementById('testLocalBtn').onclick = async () => {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = 640; canvas.height = 480;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ff6600';
        ctx.fillRect(0, 0, 640, 480);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 48px sans-serif';
        ctx.fillText('TEST', 200, 260);
        const stream = canvas.captureStream(30);
        video.srcObject = stream;
        await video.play();
        L('Local test stream playing (orange screen with TEST)', 'good');
        ctx.fillStyle = '#0066ff';
        ctx.fillRect(0, 0, 640, 480);
        ctx.fillStyle = '#fff';
        ctx.fillText('TEST', 200, 260);
      } catch (e) {
        L('Local video test failed: ' + e.message, 'bad');
      }
    };

    // ── Signaling ──
    sig.deviceId = did;
    sig.deviceType = 'base';
    sig.deviceLabel = 'Stream Test';

    sig.on('open', () => {
      dot.className = 'dot reconnecting';
      wssStatus.textContent = 'joining...';
      L('WS connected, joining room', 'good');
      sig.joinRoom('default', did);
    });

    sig.on('welcome', (data) => {
      dot.className = 'dot online';
      wssStatus.textContent = 'room:default';
      sources = data.sources || [];
      L('Joined room, sources=' + sources.length + ' deviceId=' + data.deviceId, 'good');
      renderSources();
    });

    sig.on('close', () => {
      dot.className = 'dot offline';
      wssStatus.textContent = 'disconnected';
      L('WS disconnected', 'bad');
    });

    sig.on('sourceAdded', (s) => {
      sources = sources.filter(x => x.id !== s.id);
      sources.push(s);
      L('Source added: ' + s.label + ' (' + s.publisherId + ')', 'good');
      renderSources();
    });

    sig.on('sourceRemoved', (d) => {
      sources = sources.filter(s => s.id !== d.sourceId);
      renderSources();
    });

    sig.on('subscriberJoined', (d) => {
      L('SUBSCRIBER_JOINED (we are publisher): ' + d.subscriberId, 'info');
    });

    sig.on('offer', async (data) => {
      L('OFFER received from ' + data.from + ', sdp type=' + (data.sdp ? data.sdp.type : '?'));

      rtc.onConnectionStateChange = (peerId, state) => {
        L('PC state [' + peerId + ']: ' + state, state === 'connected' ? 'good' : 'info');
      };
      rtc.onIceConnectionStateChange = (peerId, state) => {
        L('ICE state [' + peerId + ']: ' + state, state === 'connected' ? 'good' : '');
      };

      rtc.onRemoteTrack = (peerId, stream, track) => {
        L('TRACK received: peer=' + peerId + ' kind=' + track.kind + ' id=' + track.id, 'good');
        if (peerId === data.from) {
          video.srcObject = stream;
          video.play().then(() => {
            L('Video playing (' + stream.getTracks().length + ' tracks)', 'good');
          }).catch(e => {
            L('Video play() failed: ' + e.message, 'bad');
          });
        }
      };

      try {
        await rtc.handleOffer(data);
        L('handleOffer OK, answer sent', 'good');
        wssStatus.textContent = 'streaming from ' + data.from;
        document.getElementById('stopViewBtn').style.display = '';
      } catch (e) {
        L('handleOffer ERROR: ' + e.message, 'bad');
      }
    });

    sig.on('iceCandidate', (data) => {
      rtc.handleIceCandidate(data);
    });

    sig.on('error', (data) => {
      L('Server error: ' + data.code + ' ' + data.message, 'bad');
    });

    // ── Stop ──
    document.getElementById('stopViewBtn').onclick = () => {
      stopViewing();
    };

    function stopViewing() {
      if (viewingPid) {
        sig.unsubscribeSource(viewingPid);
        rtc.closePeerConnection(viewingPid);
        viewingPid = null;
      }
      video.srcObject = null;
      wssStatus.textContent = 'stopped';
      document.getElementById('stopViewBtn').style.display = 'none';
      renderSources();
      L('Stopped viewing', 'info');
    }

    // ── Sources UI ──
    function renderSources() {
      const el = document.getElementById('sources');
      if (!sources.length) {
        el.innerHTML = '<div style="color:#606080;font-size:13px;padding:4px">No sources</div>';
        return;
      }
      el.innerHTML = sources.map(s => {
        const active = viewingPid === s.publisherId;
        return '<div class="src">' +
          '<div class="info">' +
            '<div class="name">' + s.label + '</div>' +
            '<div class="meta">' + s.publisherId + ' &middot; ' + s.type + ' &middot; ' + s.status + '</div>' +
          '</div>' +
          '<div>' +
            (active
              ? '<span style="color:#4af77a;font-size:12px">WATCHING</span>'
              : '<button class="btn view-btn" data-pub="' + s.publisherId + '">View</button>'
            ) +
          '</div>' +
        '</div>';
      }).join('');
      el.querySelectorAll('.view-btn').forEach(b => {
        b.onclick = () => startViewing(b.dataset.pub);
      });
    }

    async function startViewing(pid) {
      stopViewing();
      viewingPid = pid;
      renderSources();
      L('Subscribing to ' + pid + '...', 'info');
      sig.subscribeSource(pid);
    }

    sig.connect();
  })();
  </script>
</body>
</html>
